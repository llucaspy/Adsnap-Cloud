name: Nexus Engine Worker

on:
  schedule:
    - cron: '*/15 * * * *' # Roda a cada 15 minutos
  workflow_dispatch: # Permite rodar manualmente
  repository_dispatch: # Permite gatilhos externos via API
    types: [nexus-trigger]

jobs:
  nexus-capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          touch .env
          echo "ADSNAP_CLOUD_KEYS='${{ secrets.ADSNAP_CLOUD_KEYS }}'" >> .env
          echo "DATABASE_URL='${{ secrets.DATABASE_URL }}'" >> .env
          echo "GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}'" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY='${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}'" >> .env
          echo "NEXT_PUBLIC_SUPABASE_URL='${{ secrets.SUPABASE_URL }}'" >> .env
          cp .env .env.local
          echo "✅ .env files created."

      - name: Check Database Connection
        run: npx tsx src/scripts/check-db.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Nexus Worker
        run: npm run worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_ACTIONS: "true"

      - name: Run Storage Monitor
        run: npm run monitor

  monthly-cleanup:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 1 * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ADSNAP_CLOUD_KEYS }}" > .env

      - name: Run Monthly Cleanup
        run: npm run monthly-cleanup
